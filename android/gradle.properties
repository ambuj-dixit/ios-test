# Project-wide Gradle settings.
org.gradle.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=512m -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8
android.useAndroidX=true
android.enableJetifier=true

FLIPPER_VERSION=0.182.0

# Use this property to specify which architecture you want to build.
# Using only arm64-v8a to bypass the Ninja build loop in armeabi-v7a
reactNativeArchitectures=arm64-v8a

newArchEnabled=false
hermesEnabled=true

# Fix for Ninja 'build.ninja still dirty' error by switching to NMake on Windows
android.skipAndroidCustomLintCheck=true
android.suppressUnsupportedCompileSdk=33,34,35
android.overridePathCheck=true
android.cmake.ninja.regenerate=false

workflows:
  ios-release:
    name: ESIM Campus iOS Release Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      node: 18
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install dependencies
        script: |
          npm install --legacy-peer-deps
      - name: Install CocoaPods
        script: |
          # Bypassing Bundler because the lockfile version (1.17.2) is incompatible 
          # with modern Ruby versions where 'untaint' is removed.
          cd ios && pod install --repo-update
      - name: Build iOS App
        script: |
          XCODE_WORKSPACE="ios/Esimcampus.xcworkspace"
          XCODE_SCHEME="Esimcampus"
          
          xcodebuild \
            -workspace "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -archivePath build/Esimcampus.xcarchive \
            archive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_STYLE=Manual \
            COMPILER_INDEX_STORE_ENABLE=NO
          
          mkdir -p build/ipa
          cp -r build/Esimcampus.xcarchive/Products/Applications/*.app build/ipa/
    artifacts:
      - build/ipa/*.app
      - build/Esimcampus.xcarchive

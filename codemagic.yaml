workflows:
  ios-preview:
    name: ESIM Campus iOS Omega Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      node: 18
      xcode: latest
      cocoapods: default
      vars:
        XCODE_WORKSPACE: "ios/Esimcampus.xcworkspace"
        XCODE_SCHEME: "Esimcampus"
    scripts:
      - name: Install dependencies
        script: |
          npm install --legacy-peer-deps
      - name: Global Source Pre-Repair
        script: |
          # 1. Force fix Date Picker source code (Clang Compatibility)
          echo "Surgically patching RNDatePickerManager.mm..."
          DP_FILE="node_modules/react-native-date-picker/ios/RNDatePickerManager.mm"
          if [ -f "$DP_FILE" ]; then
            # Fix UIControlEvents casting
            sed -i '' 's/UIControlEventValueChanged/(UIControlEvents)UIControlEventValueChanged/g' "$DP_FILE"
            # Ensure proper headers are imported
            sed -i '' '1i\
            #import <UIKit/UIKit.h>\
            #import <React/RCTLog.h>\
            ' "$DP_FILE"
          fi

          # 2. Fix Privacy Manifest crash
          SCRIPT_PATH="node_modules/react-native/scripts/cocoapods/privacy_manifest_utils.rb"
          if [ -f "$SCRIPT_PATH" ]; then
            echo "module PrivacyManifestUtils; def self.add_aggregated_privacy_manifest(installer); puts '[ESIM Fix] Bypassed'; end; end" > "$SCRIPT_PATH"
          fi
          
          # 3. Fix C++ syntax errors globally
          find . -type f \( -name "*.h" -o -name "*.cpp" -o -name "*.hpp" -o -name "*.m" -o -name "*.mm" \) -print0 | xargs -0 sed -i '' 's/operator"" /operator""/g' || true

          # 4. Purge XML files that cause archive failures
          find . -name "*.storyboard.xml" -delete || true
          find ios/Esimcampus -name "*.xml" -delete || true
      - name: Install CocoaPods
        script: |
          cd ios && pod install --repo-update
      - name: Post-Pod Surgery
        script: |
          # 5. Fix std::result_of removal in C++20 for all Pods
          find ios/Pods -type f \( -name "*.h" -o -name "*.cpp" -o -name "*.hpp" -o -name "*.mm" \) -print0 | xargs -0 sed -i '' 's/std::result_of/std::invoke_result/g' || true
          find ios/Pods -type f \( -name "*.h" -o -name "*.cpp" -o -name "*.hpp" -o -name "*.mm" \) -print0 | xargs -0 sed -i '' 's/result_of_t/invoke_result_t/g' || true
          
          # 6. Resolve header collisions in React-Core
          find ios/Pods -name "React-Core.podspec" -exec sed -i '' 's/header_dir = \"React\"/header_dir = \"ReactCore\"/g' {} + || true
      - name: Build iOS Application (Omega Mode)
        script: |
          echo "Starting Omega xcodebuild..."
          
          # Force clean any existing intermediate bundles to stop 'Multiple commands produce'
          rm -rf ~/Library/Developer/Xcode/DerivedData/*
          
          xcodebuild \
            -workspace "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -archivePath build/Esimcampus.xcarchive \
            archive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CLANG_CXX_LANGUAGE_STANDARD="c++17" \
            GCC_WARN_INHIBIT_ALL_WARNINGS=YES \
            OTHER_CPLUSPLUSFLAGS="\$(inherited) -w -D_LIBCPP_ENABLE_CXX20_REMOVED_TYPE_TRAITS=1" \
            OTHER_LDFLAGS="\$(inherited) -Wl,-ld_classic"
          
          # Packaging
          mkdir -p build/ios/ipa
          if [ -d "build/Esimcampus.xcarchive/Products/Applications/Esimcampus.app" ]; then
            cd build/Esimcampus.xcarchive/Products/Applications
            mkdir Payload
            cp -r Esimcampus.app Payload/
            zip -r ../../../ios/ipa/Esimcampus_Preview.ipa Payload
          else
            echo "OMEGA ERROR: App binary not found. Check build logs above."
            exit 1
          fi
    artifacts:
      - build/ios/ipa/*.ipa

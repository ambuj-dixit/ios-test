workflows:
  ios-professional:
    name: ESIM Campus Production-Grade iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      node: 18
      xcode: latest
      cocoapods: default
      vars:
        XCODE_WORKSPACE: "ios/Esimcampus.xcworkspace"
        XCODE_SCHEME: "Esimcampus"
    cache:
      cache_paths:
        - $HOME/.npm
        - node_modules
        - ios/Pods
    scripts:
      - name: Dependency Installation
        script: |
          echo "Syncing dependencies..."
          npm install --legacy-peer-deps
          
      - name: iOS Optimization Patches
        script: |
          echo "Applying architectural optimizations..."
          node scripts/patch-ios-dependencies.js

      - name: CocoaPods Synchronization
        script: |
          echo "Synchronizing native dependencies..."
          cd ios && pod install --repo-update

      - name: Production Archive
        script: |
          echo "Starting professional archive process..."
          # Build settings are managed in Podfile for maximum consistency
          xcodebuild \
            -workspace "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -archivePath build/Esimcampus.xcarchive \
            archive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            COMPILER_INDEX_STORE_ENABLE=NO \
            OTHER_LDFLAGS='$(inherited) -Wl,-ld_classic'

          echo "IPA Packaging..."
          mkdir -p build/ios/ipa
          APP_PATH=$(find build/Esimcampus.xcarchive -name "*.app" | head -n 1)
          if [ -d "$APP_PATH" ]; then
            cd $(dirname "$APP_PATH")
            mkdir Payload
            cp -r $(basename "$APP_PATH") Payload/
            zip -r ../../../ios/ipa/Esimcampus_Production.ipa Payload
            echo "✅ Production IPA generated."
          else
            echo "❌ ERROR: Application binary was not found in archive."
            exit 1
          fi
    artifacts:
      - build/ios/ipa/*.ipa

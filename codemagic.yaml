workflows:
  ios-preview:
    name: ESIM Campus iOS Ultimate Fix Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      node: 18
      xcode: latest
      cocoapods: default
      vars:
        XCODE_WORKSPACE: "ios/Esimcampus.xcworkspace"
        XCODE_SCHEME: "Esimcampus"
    scripts:
      - name: Install dependencies
        script: |
          npm install --legacy-peer-deps
      - name: Surgical Source Repair
        script: |
          echo "Executing Surgical Repair on Date Picker..."
          DP_FILE="node_modules/react-native-date-picker/ios/RNDatePickerManager.mm"
          if [ -f "$DP_FILE" ]; then
            echo "Repairing $DP_FILE"
            # Fix UIControlEvents casting error safely
            # First remove existing cast to prevent double casting if script is re-run
            sed -i '' 's/(UIControlEvents)//g' "$DP_FILE"
            # Apply the cast
            sed -i '' 's/UIControlEventValueChanged/(UIControlEvents)UIControlEventValueChanged/g' "$DP_FILE"
          
            # Bulletproof Header Injection for macOS BSD Environment
            if ! grep -q "UIKit/UIKit.h" "$DP_FILE"; then
              echo "Injecting UIKit headers..."
              echo '#import <UIKit/UIKit.h>' > "$DP_FILE.tmp"
              echo '#import <React/RCTLog.h>' >> "$DP_FILE.tmp"
              cat "$DP_FILE" >> "$DP_FILE.tmp"
              mv "$DP_FILE.tmp" "$DP_FILE"
            fi
          fi

          # 2. Fix React Native scripts safely
          SCRIPT_PATH="node_modules/react-native/scripts/cocoapods/privacy_manifest_utils.rb"
          if [ -f "$SCRIPT_PATH" ]; then
            echo "Patching $SCRIPT_PATH"
            # Instead of overwriting, we bypass the method if it causes issues
            sed -i '' 's/def self.add_aggregated_privacy_manifest(installer)/def self.add_aggregated_privacy_manifest(installer); return; /' "$SCRIPT_PATH" || true
          fi
          
          # 3. Clean up stray files on disk
          # We delete these because they confuse Xcode when present as duplicates
          find . -name "*.storyboard.xml" -delete || true
          find ios/Esimcampus -name "*.xml" -delete || true
          rm -rf "ios/Esimcampus/Esimcampus 2025-05-14 12-14-59" || true
      - name: Install CocoaPods
        script: |
          cd ios && pod install --repo-update
      - name: Final Build Optimization
        script: |
          # Inject C++ safety traits directly into Pod project build settings
          echo "Optimizing Pods workspace..."
          find ios/Pods -type f \( -name "*.h" -o -name "*.cpp" -o -name "*.hpp" -o -name "*.mm" \) -print0 | xargs -0 sed -i '' 's/std::result_of/std::invoke_result/g' || true
          find ios/Pods -type f \( -name "*.h" -o -name "*.cpp" -o -name "*.hpp" -o -name "*.mm" \) -print0 | xargs -0 sed -i '' 's/result_of_t/invoke_result_t/g' || true
          
          # Patch project for bundle sync and compiler suppression overrides
          # Also remove the problematic .xml file references from the build phases
          ruby -e "
          require 'xcodeproj'
          project = Xcodeproj::Project.open('ios/Esimcampus.xcodeproj')
          
          # Remove broken .xml references from all build phases
          project.targets.each do |target|
            target.build_phases.each do |phase|
              phase.files.each do |bf|
                if bf.file_ref && bf.file_ref.respond_to?(:path) && bf.file_ref.path && bf.file_ref.path.end_with?('.xml')
                   puts \"Removing #{bf.file_ref.path} from target #{target.name}\"
                   phase.remove_build_file(bf)
                end
              end
            end
          end

          project.targets.each do |target|
            target.build_configurations.each do |config|
              config.build_settings['CODE_SIGNING_ALLOWED'] = 'NO'
              config.build_settings['CODE_SIGNING_REQUIRED'] = 'NO'
              config.build_settings['CLANG_CXX_LANGUAGE_STANDARD'] = 'c++17'
              config.build_settings['GCC_WARN_INHIBIT_ALL_WARNINGS'] = 'YES'
              config.build_settings['PRODUCT_BUNDLE_IDENTIFIER'] = 'com.mkt.studentportal' if target.name == 'Esimcampus'
            end
          end
          project.save
          "
      - name: Build iOS Application (Ultimate Mode)
        script: |
          # Use maximum suppression and legacy linker for best compatibility
          xcodebuild \
            -workspace \"$XCODE_WORKSPACE\" \
            -scheme \"$XCODE_SCHEME\" \
            -configuration Release \
            -sdk iphoneos \
            -archivePath build/Esimcampus.xcarchive \
            archive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CLANG_CXX_LANGUAGE_STANDARD=\"c++17\" \
            GCC_WARN_INHIBIT_ALL_WARNINGS=YES \
            OTHER_CPLUSPLUSFLAGS=\"\$(inherited) -w -D_LIBCPP_ENABLE_CXX20_REMOVED_TYPE_TRAITS=1\" \
            OTHER_LDFLAGS=\"\$(inherited) -Wl,-ld_classic\"
          
          # Final IPA Packaging
          mkdir -p build/ios/ipa
          if [ -d \"build/Esimcampus.xcarchive/Products/Applications/Esimcampus.app\" ]; then
            cd build/Esimcampus.xcarchive/Products/Applications
            mkdir Payload
            cp -r Esimcampus.app Payload/
            zip -r ../../../ios/ipa/Esimcampus_Preview.ipa Payload
          else
            echo \"BUILD FAILED: Binary not found.\"
            exit 1
          fi
    artifacts:
      - build/ios/ipa/*.ipa

workflows:
  ios-release:
    name: ESIM Campus Absolute Final
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      node: 18
      xcode: latest
      cocoapods: default
      vars:
        XCODE_WORKSPACE: "ios/Esimcampus.xcworkspace"
        XCODE_SCHEME: "Esimcampus"
    scripts:
      - name: Prep
        script: |
          rm -rf node_modules ios/Pods ios/build
          npm install --legacy-peer-deps
      - name: Nuclear Patch
        script: |
          # 1. Clean build environment
          find . -name "*.storyboard.xml" -delete || true
          
          # 2. Run the specialized dependency patcher
          node scripts/patch-ios-dependencies.js
      - name: Pods
        script: |
          cd ios
          pod install --repo-update
      - name: Build
        script: |
          # Use xcodebuild archive with maximum warning suppression
          xcodebuild \
            -workspace "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -archivePath build/Esimcampus.xcarchive \
            archive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            COMPILER_INDEX_STORE_ENABLE=NO \
            GCC_WARN_INHIBIT_ALL_WARNINGS=YES \
            GCC_TREAT_WARNINGS_AS_ERRORS=NO \
            WARNING_CFLAGS="-w"
          
          mkdir -p build/ios/ipa
          # Find the app binary in the archive and package it
          APP=$(find build/Esimcampus.xcarchive -name "*.app" | head -n 1)
          if [ -d "$APP" ]; then
            cd $(dirname "$APP")
            mkdir Payload && cp -r $(basename "$APP") Payload/
            zip -r ../../../ios/ipa/Esimcampus.ipa Payload
          else
            echo "CRITICAL FAILURE: Build archive did not contain an app binary."
            find build/Esimcampus.xcarchive -maxdepth 4
            exit 1
          fi
    artifacts:
      - build/ios/ipa/*.ipa

workflows:
  ios-preview:
    name: ESIM Campus iOS Preview Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      node: 18
      xcode: latest
      cocoapods: default
      vars:
        XCODE_WORKSPACE: "ios/Esimcampus.xcworkspace"
        XCODE_SCHEME: "Esimcampus"
    scripts:
      - name: Install dependencies
        script: |
          npm install --legacy-peer-deps
      - name: Global Source Neutralizer (Deep Repair)
        script: |
          # 1. Fix Privacy Manifest crash
          SCRIPT_PATH="node_modules/react-native/scripts/cocoapods/privacy_manifest_utils.rb"
          if [ -f "$SCRIPT_PATH" ]; then
            echo "module PrivacyManifestUtils; def self.add_aggregated_privacy_manifest(installer); puts '[ESIM Fix] Bypassed'; end; end" > "$SCRIPT_PATH"
          fi
          
          # 2. Repair C++ Syntax globally
          echo "Repairing C++ Syntax..."
          find . -type f \( -name "*.h" -o -name "*.cpp" -o -name "*.hpp" -o -name "*.m" -o -name "*.mm" \) -print0 | xargs -0 sed -i '' 's/operator"" /operator""/g' || true

          # 3. Aggressively remove stray XML files and references
          rm -f ios/Esimcampus/*.xml
          sed -i '' '/\.xml/d' ios/Esimcampus.xcodeproj/project.pbxproj || true

          # 4. Fix execution permissions
          find node_modules -type f -name "*.sh" -exec chmod +x {} +
      - name: Install CocoaPods
        script: |
          cd ios && pod install --repo-update
      - name: Xcode Project Patching (Production Sync)
        script: |
          # 5. Force Bundle IDs and remove all signing requirements
          ruby -e "
          require 'xcodeproj'
          project_path = 'ios/Esimcampus.xcodeproj'
          project = Xcodeproj::Project.open(project_path)
          
          main_bundle_id = 'com.mkt.studentportal'
          
          project.targets.each do |target|
            target.build_configurations.each do |config|
              config.build_settings['CODE_SIGNING_ALLOWED'] = 'NO'
              config.build_settings['CODE_SIGNING_REQUIRED'] = 'NO'
              config.build_settings['CODE_SIGN_STYLE'] = 'Manual'
              config.build_settings['PRODUCT_BUNDLE_IDENTIFIER'] = target.name == 'Esimcampus' ? main_bundle_id : \"#{main_bundle_id}.#{target.name}\"
              
              # Force C++ compatibility at project level
              config.build_settings['CLANG_CXX_LANGUAGE_STANDARD'] = 'c++17'
              config.build_settings['GCC_PREPROCESSOR_DEFINITIONS'] ||= ['$(inherited)']
              config.build_settings['GCC_PREPROCESSOR_DEFINITIONS'] << '_LIBCPP_ENABLE_CXX20_REMOVED_TYPE_TRAITS=1'
              config.build_settings['GCC_PREPROCESSOR_DEFINITIONS'] << '_LIBCPP_ENABLE_CXX17_REMOVED_UNARY_BINARY_FUNCTION=1'
            end
          end

          project.save
          " || echo "Ruby fix failed"

      - name: Post-Pod Deep Patching
        script: |
          # 6. Inject C++20 compatibility traits directly into POD headers
          find ios/Pods -name "*.h" -o -name "*.hpp" -exec sed -i '' '1i\
          #define _LIBCPP_ENABLE_CXX20_REMOVED_TYPE_TRAITS 1\
          #define _LIBCPP_ENABLE_CXX17_REMOVED_UNARY_BINARY_FUNCTION 1\
          ' {} + || true

          # 7. Fix duplicate symbol issues in React-Core
          find ios/Pods -name "React-Core.podspec" -exec sed -i '' 's/header_dir = \"React\"/header_dir = \"ReactCore\"/g' {} + || true
      - name: Build iOS Application (Preview Mode)
        script: |
          # Use ARCHIVE with exhaustive error bypass flags
          xcodebuild \
            -workspace "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -archivePath build/Esimcampus.xcarchive \
            archive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_STYLE=Manual \
            COMPILER_INDEX_STORE_ENABLE=NO \
            CLANG_CXX_LANGUAGE_STANDARD="c++17" \
            GCC_WARN_INHIBIT_ALL_WARNINGS=YES \
            OTHER_CPLUSPLUSFLAGS="\$(inherited) -w -Wno-error -Wno-deprecated-literal-operator -D_LIBCPP_ENABLE_CXX20_REMOVED_TYPE_TRAITS=1" \
            GCC_PREPROCESSOR_DEFINITIONS="\$(inherited) _LIBCPP_ENABLE_CXX20_REMOVED_TYPE_TRAITS=1 _LIBCPP_ENABLE_CXX17_REMOVED_UNARY_BINARY_FUNCTION=1" \
            OTHER_LDFLAGS="\$(inherited) -Wl,-ld_classic"
          
          # Packaging
          mkdir -p build/ios/ipa
          if [ -d "build/Esimcampus.xcarchive/Products/Applications/Esimcampus.app" ]; then
            cd build/Esimcampus.xcarchive/Products/Applications
            mkdir Payload
            cp -r Esimcampus.app Payload/
            zip -r ../../../ios/ipa/Esimcampus_Preview.ipa Payload
          else
            echo "CRITICAL ERROR: Build finished but .app not found in archive."
            exit 1
          fi
    artifacts:
      - build/ios/ipa/*.ipa

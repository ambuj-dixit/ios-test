workflows:
  ios-preview:
    name: ESIM Campus World-Class iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      node: 18
      xcode: latest # Ensures we use the latest stable Xcode
      cocoapods: default
      vars:
        XCODE_WORKSPACE: "ios/Esimcampus.xcworkspace"
        XCODE_SCHEME: "Esimcampus"
    scripts:
      - name: Environment Setup
        script: |
          echo "Setting up Node.js and dependencies..."
          rm -rf node_modules ios/Pods ios/build
          npm install --legacy-peer-deps
          
      - name: Run Dependency Patches
        script: |
          echo "Applying surgical patches to node_modules..."
          node scripts/patch-ios-dependencies.js

      - name: Install CocoaPods
        script: |
          echo "Installing CocoaPods..."
          cd ios && pod install --repo-update

      - name: Build iOS Application (Optimized)
        script: |
          echo "Starting xcodebuild archive..."
          # We rely on Podfile for build settings to ensure consistency across all targets
          xcodebuild \
            -workspace "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -archivePath build/Esimcampus.xcarchive \
            archive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            COMPILER_INDEX_STORE_ENABLE=NO

          echo "Packaging IPA for Preview..."
          mkdir -p build/ios/ipa
          if [ -d "build/Esimcampus.xcarchive/Products/Applications/Esimcampus.app" ]; then
            cd build/Esimcampus.xcarchive/Products/Applications
            mkdir Payload
            cp -r Esimcampus.app Payload/
            zip -r ../../../ios/ipa/Esimcampus_Preview.ipa Payload
            echo "✅ IPA generated successfully."
          else
            echo "❌ CRITICAL BUILD FAILURE: Application binary was not generated."
            # List archive contents to help debug
            ls -R build/Esimcampus.xcarchive
            exit 1
          fi
    artifacts:
      - build/ios/ipa/*.ipa

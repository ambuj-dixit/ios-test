workflows:
  ios-release:
    name: ESIM Campus Absolute Final
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      node: 18
      xcode: latest
      cocoapods: default
      vars:
        XCODE_WORKSPACE: "ios/Esimcampus.xcworkspace"
        XCODE_SCHEME: "Esimcampus"
    scripts:
      - name: Prep
        script: |
          rm -rf node_modules ios/Pods ios/build
          npm install --legacy-peer-deps
      - name: Nuclear Patch
        script: node scripts/patch-ios-dependencies.js
      - name: Pods
        script: cd ios && pod install --repo-update
      - name: Build
        script: |
          # The absolute final suppression flags
          xcodebuild \
            -workspace "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -archivePath build/Esimcampus.xcarchive \
            archive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            WARNING_CFLAGS="-w" \
            GCC_WARN_INHIBIT_ALL_WARNINGS=YES \
            GCC_TREAT_WARNINGS_AS_ERRORS=NO \
            OTHER_LDFLAGS='$(inherited) -Wl,-ld_classic'
          
          mkdir -p build/ios/ipa
          APP=$(find build/Esimcampus.xcarchive -name "*.app" | head -n 1)
          if [ -d "$APP" ]; then
            cd $(dirname "$APP")
            mkdir Payload && cp -r $(basename "$APP") Payload/
            zip -r ../../../ios/ipa/Esimcampus.ipa Payload
          else
            exit 1
          fi
    artifacts:
      - build/ios/ipa/*.ipa

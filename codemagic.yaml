workflows:
  ios-preview:
    name: ESIM Campus iOS Preview Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      node: 18
      xcode: latest
      cocoapods: default
      vars:
        XCODE_WORKSPACE: "ios/Esimcampus.xcworkspace"
        XCODE_SCHEME: "Esimcampus"
    scripts:
      - name: Install dependencies
        script: |
          npm install --legacy-peer-deps
      - name: Global Source Neutralizer (Bypass Errors)
        script: |
          # 1. Fix Privacy Manifest crash in RN scripts
          SCRIPT_PATH="node_modules/react-native/scripts/cocoapods/privacy_manifest_utils.rb"
          if [ -f "$SCRIPT_PATH" ]; then
            echo "module PrivacyManifestUtils; def self.add_aggregated_privacy_manifest(installer); puts '[ESIM Fix] Bypassed'; end; end" > "$SCRIPT_PATH"
          fi
          
          # 2. Repair C++ syntax in ALL source files (Global fix for 'operator"" ')
          echo "Repairing C++ Syntax..."
          find . -type f \( -name "*.h" -o -name "*.cpp" -o -name "*.hpp" -o -name "*.m" -o -name "*.mm" \) -print0 | xargs -0 sed -i '' 's/operator"" /operator""/g' || true

          # 3. Remove stray XML files that confuse Xcode
          rm -f ios/Esimcampus/*.xml

          # 4. Fix execution permissions
          find node_modules -type f -name "*.sh" -exec chmod +x {} +
      - name: Install CocoaPods
        script: |
          cd ios && pod install --repo-update
      - name: Xcode Project Patching (Bypass Signing & Linker Errors)
        script: |
          # 5. Use Ruby to fix Project Settings and Bundle IDs
          ruby -e "
          require 'xcodeproj'
          project_path = 'ios/Esimcampus.xcodeproj'
          project = Xcodeproj::Project.open(project_path)
          
          # Fix Main Target
          main_target = project.targets.find { |t| t.name == 'Esimcampus' }
          main_bundle_id = 'com.mkt.studentportal'
          
          main_target.build_configurations.each do |config|
            config.build_settings['CODE_SIGNING_ALLOWED'] = 'NO'
            config.build_settings['CODE_SIGNING_REQUIRED'] = 'NO'
            config.build_settings['LD_RUNPATH_SEARCH_PATHS'] = ['\$(inherited)', '@executable_path/Frameworks']
            # Force production bundle ID for preview
            config.build_settings['PRODUCT_BUNDLE_IDENTIFIER'] = main_bundle_id
          end

          # Fix Extension Target Bundle ID (Must be sub-domain of main)
          ext_target = project.targets.find { |t| t.name == 'OneSignalNotificationServiceExtension' }
          if ext_target
            ext_target.build_configurations.each do |config|
              config.build_settings['PRODUCT_BUNDLE_IDENTIFIER'] = \"#{main_bundle_id}.OneSignalExtension\"
              config.build_settings['CODE_SIGNING_ALLOWED'] = 'NO'
              config.build_settings['CODE_SIGNING_REQUIRED'] = 'NO'
            end
          end

          project.save
          " || echo "Ruby fix failed, continuing anyway..."

      - name: Post-Pod Deep Patching
        script: |
          # 6. Fix Folly C++20 compatibility
          find ios/Pods/RCT-Folly -name "*.cpp" -exec sed -i '' '1i\
          #define _LIBCPP_ENABLE_CXX20_REMOVED_TYPE_TRAITS 1\
          ' {} + || true

          # 7. Fix duplicate symbol issues in React-Core
          find ios/Pods -name "React-Core.podspec" -exec sed -i '' 's/header_dir = \"React\"/header_dir = \"ReactCore\"/g' {} + || true
      - name: Build iOS Application (Preview Mode)
        script: |
          # Use 'archive' to generate the most complete build for the manager
          xcodebuild \
            -workspace "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -archivePath build/Esimcampus.xcarchive \
            archive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_STYLE=Manual \
            COMPILER_INDEX_STORE_ENABLE=NO \
            CLANG_CXX_LANGUAGE_STANDARD="c++17" \
            GCC_WARN_INHIBIT_ALL_WARNINGS=YES \
            OTHER_CPLUSPLUSFLAGS="\$(inherited) -w -Wno-error=deprecated-literal-operator" \
            OTHER_LDFLAGS="\$(inherited) -Wl,-ld_classic"
          
          # Create an unsigned IPA for preview
          mkdir -p build/ios/ipa
          if [ -d "build/Esimcampus.xcarchive/Products/Applications/Esimcampus.app" ]; then
            cd build/Esimcampus.xcarchive/Products/Applications
            mkdir Payload
            cp -r Esimcampus.app Payload/
            zip -r ../../../ios/ipa/Esimcampus_Preview.ipa Payload
          else
            echo "Build failed - App binary not found!"
            exit 1
          fi
    artifacts:
      - build/ios/ipa/*.ipa

workflows:
  ios-release:
    name: ESIM Campus iOS Release Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      node: 20.x
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install dependencies
        script: |
          yarn install
      - name: Install CocoaPods
        script: |
          cd ios && pod install
      - name: Build iOS App
        script: |
          xcodebuild \
            -workspace ios/Esimcampus.xcworkspace \
            -scheme "Esimcampus" \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            clean build \
            CODE_SIGNING_ALLOWED=NO
    artifacts:
      - build/Build/Products/Release-iphoneos/*.ipa

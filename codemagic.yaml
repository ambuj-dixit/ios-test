workflows:
  ios-preview:
    name: ESIM Campus Ultimate Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      node: 18
      xcode: latest
      cocoapods: default
      vars:
        XCODE_WORKSPACE: "ios/Esimcampus.xcworkspace"
        XCODE_SCHEME: "Esimcampus"
    scripts:
      - name: Environment Setup
        script: |
          echo "Clearing caches and installing dependencies..."
          rm -rf node_modules ios/Pods ios/build
          npm install --legacy-peer-deps
          
      - name: Surgical Dependency Patching
        script: |
          node scripts/patch-ios-dependencies.js

      - name: CocoaPods Install
        script: |
          cd ios && pod install --repo-update

      - name: Ultimate Build & Archive
        script: |
          echo "Starting Ultimate Archive Process..."
          # We use the workspace and scheme configured via Podfile
          xcodebuild \
            -workspace "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -archivePath build/Esimcampus.xcarchive \
            archive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            COMPILER_INDEX_STORE_ENABLE=NO \
            GCC_WARN_INHIBIT_ALL_WARNINGS=YES

          echo "Packaging IPA..."
          mkdir -p build/ios/ipa
          if [ -d "build/Esimcampus.xcarchive/Products/Applications/Esimcampus.app" ]; then
            cd build/Esimcampus.xcarchive/Products/Applications
            mkdir Payload
            cp -r Esimcampus.app Payload/
            zip -r ../../../ios/ipa/Esimcampus_Preview.ipa Payload
            echo "✅ Build Successful."
          else
            echo "❌ BUILD FAILED: App binary not found in archive."
            # Debug: List what WAS generated
            find build/Esimcampus.xcarchive -name "*.app"
            exit 1
          fi
    artifacts:
      - build/ios/ipa/*.ipa

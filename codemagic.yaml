workflows:
  ios-preview:
    name: ESIM Campus iOS Permanent Fix Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      node: 18
      xcode: latest
      cocoapods: default
      vars:
        XCODE_WORKSPACE: "ios/Esimcampus.xcworkspace"
        XCODE_SCHEME: "Esimcampus"
    scripts:
      - name: Install dependencies
        script: |
          npm install --legacy-peer-deps
      - name: Global Source Pre-Repair
        script: |
          # 1. Fix Privacy Manifest crash in RN scripts
          SCRIPT_PATH="node_modules/react-native/scripts/cocoapods/privacy_manifest_utils.rb"
          if [ -f "$SCRIPT_PATH" ]; then
            echo "module PrivacyManifestUtils; def self.add_aggregated_privacy_manifest(installer); puts '[ESIM Fix] Bypassed'; end; end" > "$SCRIPT_PATH"
          fi
          
          # 2. Fix C++ syntax errors globally
          find . -type f \( -name "*.h" -o -name "*.cpp" -o -name "*.hpp" -o -name "*.m" -o -name "*.mm" \) -print0 | xargs -0 sed -i '' 's/operator"" /operator""/g' || true

          # 3. Purge non-compilable XML files
          find ios/Esimcampus -name "*.xml" -delete || true
          
          # 4. Fix permissions
          find node_modules -type f -name "*.sh" -exec chmod +x {} +
      - name: Install CocoaPods
        script: |
          cd ios && pod install --repo-update
      - name: NUCLEAR POD REPAIR (Source Level)
        script: |
          echo "Executing Nuclear C++ Repair on Pods..."
          # Replace all instances of result_of with invoke_result (C++17/20 compatible)
          # This is the ONLY permanent fix for Folly and Reanimated on new Xcode.
          find ios/Pods -type f \( -name "*.h" -o -name "*.cpp" -o -name "*.hpp" \) -print0 | xargs -0 sed -i '' 's/std::result_of/std::invoke_result/g' || true
          find ios/Pods -type f \( -name "*.h" -o -name "*.cpp" -o -name "*.hpp" \) -print0 | xargs -0 sed -i '' 's/result_of_t/invoke_result_t/g' || true
          
          # Inject compatibility macros into all Pods PCH files
          find ios/Pods -name "*.pch" -exec sed -i '' '1i\
          #define _LIBCPP_ENABLE_CXX20_REMOVED_TYPE_TRAITS 1\
          ' {} + || true
      - name: Xcode Project Patching
        script: |
          ruby -e "
          require 'xcodeproj'
          # Patch Main Project
          project = Xcodeproj::Project.open('ios/Esimcampus.xcodeproj')
          project.targets.each do |target|
            target.build_configurations.each do |config|
              config.build_settings['CODE_SIGNING_ALLOWED'] = 'NO'
              config.build_settings['CODE_SIGNING_REQUIRED'] = 'NO'
              config.build_settings['PRODUCT_BUNDLE_IDENTIFIER'] = target.name == 'Esimcampus' ? 'com.mkt.studentportal' : \"com.mkt.studentportal.#{target.name}\"
              config.build_settings['CLANG_CXX_LANGUAGE_STANDARD'] = 'c++17'
            end
          end
          project.save

          # Patch Pods Project directly for redundancy
          if File.exist?('ios/Pods/Pods.xcodeproj')
            pods_project = Xcodeproj::Project.open('ios/Pods/Pods.xcodeproj')
            pods_project.targets.each do |target|
              target.build_configurations.each do |config|
                config.build_settings['CLANG_CXX_LANGUAGE_STANDARD'] = 'c++17'
                config.build_settings['GCC_PREPROCESSOR_DEFINITIONS'] ||= ['$(inherited)']
                config.build_settings['GCC_PREPROCESSOR_DEFINITIONS'] << '_LIBCPP_ENABLE_CXX20_REMOVED_TYPE_TRAITS=1'
              end
            end
            pods_project.save
          end
          "
      - name: Build iOS Application (Preview Mode)
        script: |
          xcodebuild \
            -workspace "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -archivePath build/Esimcampus.xcarchive \
            archive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CLANG_CXX_LANGUAGE_STANDARD="c++17" \
            GCC_WARN_INHIBIT_ALL_WARNINGS=YES \
            OTHER_CPLUSPLUSFLAGS="\$(inherited) -w -D_LIBCPP_ENABLE_CXX20_REMOVED_TYPE_TRAITS=1" \
            OTHER_LDFLAGS="\$(inherited) -Wl,-ld_classic"
          
          # Final Packaging
          mkdir -p build/ios/ipa
          if [ -d "build/Esimcampus.xcarchive/Products/Applications/Esimcampus.app" ]; then
            cd build/Esimcampus.xcarchive/Products/Applications
            mkdir Payload
            cp -r Esimcampus.app Payload/
            zip -r ../../../ios/ipa/Esimcampus_Preview.ipa Payload
          else
            echo "ERROR: Archive failed - .app binary not produced."
            exit 1
          fi
    artifacts:
      - build/ios/ipa/*.ipa

workflows:
  ios-release:
    name: ESIM Campus Absolute Final
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      node: 18
      xcode: latest
      cocoapods: default
      vars:
        XCODE_WORKSPACE: "ios/Esimcampus.xcworkspace"
        XCODE_SCHEME: "Esimcampus"
    scripts:
      - name: Prep
        script: |
          echo "Preparing Environment..."
          # Clean stale artifacts
          rm -rf node_modules ios/Pods ios/Podfile.lock ios/build package-lock.json
          # Ensure Yarn project boundary
          touch yarn.lock
          yarn install
      - name: Nuclear Patch
        script: |
          echo "Executing Surgical Dependency Fixes..."
          node scripts/patch-ios-dependencies.js
      - name: Pods
        script: |
          echo "Installing CocoaPods..."
          cd ios && pod install --repo-update
      - name: Build
        script: |
          echo "Starting Production Archive..."
          xcodebuild \
            -workspace "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -archivePath build/Esimcampus.xcarchive \
            archive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            COMPILER_INDEX_STORE_ENABLE=NO \
            GCC_WARN_INHIBIT_ALL_WARNINGS=YES \
            GCC_TREAT_WARNINGS_AS_ERRORS=NO \
            CLANG_ALLOW_NON_MODULAR_INCLUDES_IN_FRAMEWORK_MODULES=YES \
            WARNING_CFLAGS="-w"
          
          echo "Packaging IPA..."
          mkdir -p build/ios/ipa
          # Dynamically locate the app binary
          APP=$(find build/Esimcampus.xcarchive -name "*.app" | head -n 1)
          if [ -d "$APP" ]; then
            cd $(dirname "$APP")
            mkdir Payload && cp -r $(basename "$APP") Payload/
            zip -r ../../../ios/ipa/Esimcampus.ipa Payload
            echo "✅ Build Successful."
          else
            echo "❌ CRITICAL FAILURE: Build archive did not contain an app binary."
            exit 1
          fi
    artifacts:
      - build/ios/ipa/*.ipa

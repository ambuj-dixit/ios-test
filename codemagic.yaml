workflows:
  ios-preview:
    name: ESIM Campus Professional iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      node: 18
      xcode: latest
      cocoapods: default
      vars:
        XCODE_WORKSPACE: "ios/Esimcampus.xcworkspace"
        XCODE_SCHEME: "Esimcampus"
    scripts:
      - name: Environment Cleanup & Install
        script: |
          echo "Cleaning environment..."
          rm -rf node_modules ios/Pods ios/build
          npm install --legacy-peer-deps
          
      - name: Professional Patching
        script: |
          echo "Applying surgical patches..."
          node scripts/patch-ios-dependencies.js

      - name: CocoaPods Installation
        script: |
          echo "Installing CocoaPods..."
          cd ios && pod install --repo-update

      - name: Build & Archive iOS
        script: |
          echo "Building application..."
          # The Podfile now handles all complex build settings automatically
          xcodebuild \
            -workspace "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -archivePath build/Esimcampus.xcarchive \
            archive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            COMPILER_INDEX_STORE_ENABLE=NO

          echo "Packaging IPA..."
          mkdir -p build/ios/ipa
          if [ -d "build/Esimcampus.xcarchive/Products/Applications/Esimcampus.app" ]; then
            cd build/Esimcampus.xcarchive/Products/Applications
            mkdir Payload
            cp -r Esimcampus.app Payload/
            zip -r ../../../ios/ipa/Esimcampus_Preview.ipa Payload
            echo "✅ Build Successful."
          else
            echo "❌ Build Failed: App binary not found."
            exit 1
          fi
    artifacts:
      - build/ios/ipa/*.ipa

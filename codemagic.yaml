workflows:
  ios-release:
    name: ESIM Campus iOS Release Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      node: 18
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install dependencies
        script: |
          npm install --legacy-peer-deps
      - name: Fix Buggy React Native Scripts
        script: |
          # 1. Neutralize Privacy Manifest script crash
          SCRIPT_PATH="node_modules/react-native/scripts/cocoapods/privacy_manifest_utils.rb"
          if [ -f "$SCRIPT_PATH" ]; then
            echo "module PrivacyManifestUtils; def self.add_aggregated_privacy_manifest(installer); puts '[ESIM Fix] Bypassed Buggy Script'; end; end" > "$SCRIPT_PATH"
          fi
          
          # 2. Fix Yoga.cpp compilation errors (Literal Operator Deprecation)
          YOGA_VALUE_H="node_modules/react-native/ReactCommon/yoga/yoga/YGValue.h"
          if [ -f "$YOGA_VALUE_H" ]; then
            sed -i '' 's/operator"" _pt/operator""_pt/g' "$YOGA_VALUE_H"
            sed -i '' 's/operator"" _percent/operator""_percent/g' "$YOGA_VALUE_H"
            echo "Yoga literal operators fixed in $YOGA_VALUE_H"
          fi

          # 3. Remove problematic XML duplicate files in iOS folder
          rm -f ios/Esimcampus/LaunchScreen.storyboard.xml
          rm -f ios/Esimcampus/Esimcampus.entitlements.xml

          # 4. Fix execution permissions for all node_modules scripts
          find node_modules -type f -name "*.sh" -exec chmod +x {} +
      - name: Install CocoaPods
        script: |
          cd ios && pod install --repo-update
      - name: Build iOS App
        script: |
          XCODE_WORKSPACE="ios/Esimcampus.xcworkspace"
          XCODE_SCHEME="Esimcampus"
          
          # ARCHIVE the app
          # GCC_PREPROCESSOR_DEFINITIONS: Suppress C++ deprecation warnings in Yoga and Folly
          # OTHER_CPLUSPLUSFLAGS: Specifically target the literal operator error as a warning
          xcodebuild \
            -workspace "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -archivePath build/Esimcampus.xcarchive \
            archive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_STYLE=Manual \
            COMPILER_INDEX_STORE_ENABLE=NO \
            ENABLE_USER_SCRIPT_SANDBOXING=NO \
            GCC_PREPROCESSOR_DEFINITIONS="\$(inherited) _LIBCPP_ENABLE_CXX17_REMOVED_UNARY_BINARY_FUNCTION=1" \
            OTHER_CPLUSPLUSFLAGS="\$(inherited) -Wno-error=deprecated-literal-operator -Wno-deprecated-literal-operator" \
            OTHER_LDFLAGS="\$(inherited) -Wl,-ld_classic"
          
          mkdir -p build/ipa
          cp -r build/Esimcampus.xcarchive/Products/Applications/*.app build/ipa/
    artifacts:
      - build/ipa/*.app
      - build/Esimcampus.xcarchive

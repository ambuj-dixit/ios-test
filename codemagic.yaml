workflows:
  ios-release:
    name: ESIM Campus iOS Release Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      node: 18
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install dependencies
        script: |
          npm install --legacy-peer-deps
      - name: Fix Buggy React Native Scripts
        script: |
          # Brute-force fix for Privacy Manifest script crash
          SCRIPT_PATH="node_modules/react-native/scripts/cocoapods/privacy_manifest_utils.rb"
          if [ -f "$SCRIPT_PATH" ]; then
            echo "module PrivacyManifestUtils; def self.add_aggregated_privacy_manifest(installer); puts '[ESIM Fix] Bypassed Buggy Script'; end; end" > "$SCRIPT_PATH"
          fi
          
          # Fix execution permissions for all node_modules scripts
          find node_modules -type f -name "*.sh" -exec chmod +x {} +
      - name: Install CocoaPods
        script: |
          cd ios && pod install --repo-update
      - name: Build iOS App
        script: |
          XCODE_WORKSPACE="ios/Esimcampus.xcworkspace"
          XCODE_SCHEME="Esimcampus"
          
          # ARCHIVE the app
          # ENABLE_USER_SCRIPT_SANDBOXING=NO is critical for Xcode 15+ to allow Pods scripts to run
          # OTHER_LDFLAGS="-Wl,-ld_classic" handles linker issues in Xcode 15+
          xcodebuild \
            -workspace "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -archivePath build/Esimcampus.xcarchive \
            archive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_STYLE=Manual \
            COMPILER_INDEX_STORE_ENABLE=NO \
            ENABLE_USER_SCRIPT_SANDBOXING=NO \
            OTHER_LDFLAGS="\$(inherited) -Wl,-ld_classic"
          
          mkdir -p build/ipa
          cp -r build/Esimcampus.xcarchive/Products/Applications/*.app build/ipa/
    artifacts:
      - build/ipa/*.app
      - build/Esimcampus.xcarchive

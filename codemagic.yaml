workflows:
  ios-release:
    name: ESIM Campus Professional Production
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      node: 18
      xcode: latest
      cocoapods: default
      vars:
        XCODE_WORKSPACE: "ios/Esimcampus.xcworkspace"
        XCODE_SCHEME: "Esimcampus"
    cache:
      cache_paths:
        - $HOME/.npm
        - node_modules
        - ios/Pods
    scripts:
      - name: System Preparation
        script: |
          echo "Preparing professional environment..."
          rm -rf node_modules ios/Pods ios/build
          npm install --legacy-peer-deps
          
      - name: Professional Dependency Patching
        script: |
          echo "Applying surgical dependency patches..."
          node scripts/patch-ios-dependencies.js

      - name: CocoaPods Synchronization
        script: |
          echo "Running professional pod install..."
          cd ios && pod install --repo-update

      - name: Production Build & Archive
        script: |
          echo "Starting production archive..."
          xcodebuild \
            -workspace "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -archivePath build/Esimcampus.xcarchive \
            archive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            COMPILER_INDEX_STORE_ENABLE=NO \
            GCC_WARN_INHIBIT_ALL_WARNINGS=YES \
            GCC_TREAT_WARNINGS_AS_ERRORS=NO

          echo "IPA Generation..."
          mkdir -p build/ios/ipa
          # Dynamically locate the app binary to ensure packaging success
          APP_BINARY=$(find build/Esimcampus.xcarchive -name "*.app" | head -n 1)
          if [ -d "$APP_BINARY" ]; then
            cd $(dirname "$APP_BINARY")
            mkdir Payload
            cp -r $(basename "$APP_BINARY") Payload/
            zip -r ../../../ios/ipa/Esimcampus_Production.ipa Payload
            echo "✅ SUCCESS: Production IPA generated."
          else
            echo "❌ CRITICAL: Build binary not found."
            exit 1
          fi
    artifacts:
      - build/ios/ipa/*.ipa

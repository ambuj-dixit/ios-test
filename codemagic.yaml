workflows:
  ios-preview:
    name: ESIM Campus iOS World-Class Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      node: 18
      xcode: latest
      cocoapods: default
      vars:
        XCODE_WORKSPACE: "ios/Esimcampus.xcworkspace"
        XCODE_SCHEME: "Esimcampus"
    scripts:
      - name: Install dependencies
        script: |
          npm install --legacy-peer-deps
      - name: Global Source Surgery (Pre-Pod)
        script: |
          # 1. Fix Privacy Manifest crash
          SCRIPT_PATH="node_modules/react-native/scripts/cocoapods/privacy_manifest_utils.rb"
          if [ -f "$SCRIPT_PATH" ]; then
            echo "module PrivacyManifestUtils; def self.add_aggregated_privacy_manifest(installer); puts '[ESIM Fix] Bypassed'; end; end" > "$SCRIPT_PATH"
          fi
          
          # 2. Universal Literal Operator Fix
          echo "Applying C++ Syntax Repair..."
          find . -type f \( -name "*.h" -o -name "*.cpp" -o -name "*.hpp" -o -name "*.m" -o -name "*.mm" \) -print0 | xargs -0 sed -i '' 's/operator"" /operator""/g' || true

          # 3. Purge confusing XML files from compile phase
          echo "Cleaning project structure..."
          find ios/Esimcampus -name "*.xml" -delete || true
          sed -i '' '/\.xml/d' ios/Esimcampus.xcodeproj/project.pbxproj || true
          
          # 4. Fix permissions
          find node_modules -type f -name "*.sh" -exec chmod +x {} +
      - name: Install CocoaPods
        script: |
          cd ios && pod install --repo-update
      - name: Deep Pod Repair (Source Patching)
        script: |
          # 5. Inject C++ Traits into every Pod Header to force C++20 compatibility
          echo "Injecting compatibility traits into Pods..."
          find ios/Pods -name "*.h" -o -name "*.hpp" -exec sed -i '' '1i\
          #define _LIBCPP_ENABLE_CXX20_REMOVED_TYPE_TRAITS 1\
          #define _LIBCPP_ENABLE_CXX17_REMOVED_UNARY_BINARY_FUNCTION 1\
          ' {} + || true

          # 6. Specific fix for Folly VirtualEventBase.cpp
          FOLLY_FIX="ios/Pods/RCT-Folly/folly/io/async/VirtualEventBase.cpp"
          if [ -f "$FOLLY_FIX" ]; then
            sed -i '' '1i\
            #define _LIBCPP_ENABLE_CXX20_REMOVED_TYPE_TRAITS 1\
            ' "$FOLLY_FIX"
          fi

          # 7. Resolve React-Core header duplication conflicts
          find ios/Pods -name "React-Core.podspec" -exec sed -i '' 's/header_dir = \"React\"/header_dir = \"ReactCore\"/g' {} + || true
      - name: Xcode Project Harmonization
        script: |
          # 8. Unify all targets using Ruby
          echo "Harmonizing Xcode Project targets..."
          ruby -e "
          require 'xcodeproj'
          project = Xcodeproj::Project.open('ios/Esimcampus.xcodeproj')
          bundle_id = 'com.mkt.studentportal'
          
          project.targets.each do |target|
            target.build_configurations.each do |config|
              # Force Build Standards
              config.build_settings['CLANG_CXX_LANGUAGE_STANDARD'] = 'c++17'
              config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '15.0'
              config.build_settings['GCC_WARN_INHIBIT_ALL_WARNINGS'] = 'YES'
              
              # Disable Signing for Preview
              config.build_settings['CODE_SIGNING_ALLOWED'] = 'NO'
              config.build_settings['CODE_SIGNING_REQUIRED'] = 'NO'
              config.build_settings['CODE_SIGN_STYLE'] = 'Manual'
              
              # Set Bundle IDs
              config.build_settings['PRODUCT_BUNDLE_IDENTIFIER'] = target.name == 'Esimcampus' ? bundle_id : \"#{bundle_id}.#{target.name}\"
              
              # Add global preprocessor safety
              config.build_settings['GCC_PREPROCESSOR_DEFINITIONS'] ||= ['$(inherited)']
              config.build_settings['GCC_PREPROCESSOR_DEFINITIONS'] << '_LIBCPP_ENABLE_CXX20_REMOVED_TYPE_TRAITS=1'
            end
          end
          project.save
          "
      - name: Build iOS Application (Preview Mode)
        script: |
          # Final build command with maximum stability flags
          echo "Starting Master Archive..."
          xcodebuild \
            -workspace "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -archivePath build/Esimcampus.xcarchive \
            archive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CLANG_CXX_LANGUAGE_STANDARD="c++17" \
            GCC_WARN_INHIBIT_ALL_WARNINGS=YES \
            OTHER_CPLUSPLUSFLAGS="\$(inherited) -w -Wno-error -D_LIBCPP_ENABLE_CXX20_REMOVED_TYPE_TRAITS=1" \
            OTHER_LDFLAGS="\$(inherited) -Wl,-ld_classic"
          
          # Packaging the IPA for manager review
          mkdir -p build/ios/ipa
          if [ -d "build/Esimcampus.xcarchive/Products/Applications/Esimcampus.app" ]; then
            cd build/Esimcampus.xcarchive/Products/Applications
            mkdir Payload
            cp -r Esimcampus.app Payload/
            zip -r ../../../ios/ipa/Esimcampus_Preview.ipa Payload
          else
            echo "ERROR: App binary not found in archive."
            exit 1
          fi
    artifacts:
      - build/ios/ipa/*.ipa

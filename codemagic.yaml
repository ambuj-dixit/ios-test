workflows:
  ios-debug:
    name: ESIM Campus iOS Hyper-Stable Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      node: 18
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install dependencies
        script: |
          npm install --legacy-peer-deps
      - name: Neutralize Buggy Source Code
        script: |
          # 1. Fix Privacy Manifest crash
          SCRIPT_PATH="node_modules/react-native/scripts/cocoapods/privacy_manifest_utils.rb"
          if [ -f "$SCRIPT_PATH" ]; then
            echo "module PrivacyManifestUtils; def self.add_aggregated_privacy_manifest(installer); puts '[ESIM Fix] Bypassed'; end; end" > "$SCRIPT_PATH"
          fi
          
          # 2. Recursive Fix for all C++ Literal Operator errors (Yoga, Folly, etc.)
          echo "Repairing C++ Syntax in node_modules..."
          find node_modules -name "*.h" -o -name "*.cpp" -o -name "*.hpp" | xargs sed -i '' 's/operator""  *_/operator""_/g'

          # 3. Permissions fix
          find node_modules -type f -name "*.sh" -exec chmod +x {} +
      - name: Install CocoaPods
        script: |
          cd ios && pod install --repo-update
      - name: Post-Pod Source Patching
        script: |
          # 4. Repair Syntax errors in the freshly downloaded Pods
          echo "Repairing C++ Syntax in Pods..."
          find ios/Pods -name "*.h" -o -name "*.cpp" -o -name "*.hpp" | xargs sed -i '' 's/operator""  *_/operator""_/g'
          
          # 5. Fix Folly C++20 'result_of' error by forcing the correct traits
          find ios/Pods/RCT-Folly -name "*.cpp" -o -name "*.h" | xargs sed -i '' '1i\
          #define _LIBCPP_ENABLE_CXX20_REMOVED_TYPE_TRAITS 1
          '
      - name: Build iOS Application
        script: |
          XCODE_WORKSPACE="ios/Esimcampus.xcworkspace"
          XCODE_SCHEME="Esimcampus"
          
          # ARCHIVE in Debug-compatible mode (No certificates required)
          xcodebuild \
            -workspace "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -archivePath build/Esimcampus.xcarchive \
            archive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_STYLE=Manual \
            COMPILER_INDEX_STORE_ENABLE=NO \
            ENABLE_USER_SCRIPT_SANDBOXING=NO \
            CLANG_CXX_LANGUAGE_STANDARD="c++17" \
            GCC_WARN_INHIBIT_ALL_WARNINGS=YES \
            OTHER_CPLUSPLUSFLAGS="\$(inherited) -w -Wno-error=deprecated-literal-operator" \
            OTHER_LDFLAGS="\$(inherited) -Wl,-ld_classic"
          
          mkdir -p build/debug-app
          cp -r build/Esimcampus.xcarchive/Products/Applications/*.app build/debug-app/
    artifacts:
      - build/debug-app/*.app
